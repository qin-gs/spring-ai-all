# Qwen 模型配置
# 获取 API 密钥：https://help.aliyun.com/zh/dashscope/developer-reference/api-key

# Qwen API 配置（OpenAI 兼容模式）
spring.ai.openai.api-key=${QWEN_API_KEY:your-qwen-api-key-here}
spring.ai.openai.chat.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1

# 可选模型：
# - qwen-max: 最新版通义千问模型，支持超长上下文和文件上传
# - qwen-plus: 高性能版本，支持128K上下文
# - qwen-turbo: 高速版本，支持128K上下文
# - qwen-2.5-32b-instruct: 32B 指令微调版本
spring.ai.openai.chat.options.model=qwen-max

# 注意：Qwen API 可能需要不同的 base-url
# 其他可能的 endpoint：
# - 标准 OpenAI 兼容：https://dashscope.aliyuncs.com/compatible-mode/v1
# - 旧版本：https://dashscope-intl.aliyuncs.com/api/v1/services/aigc/text-generation/generation