# Spring AI Learn 模块配置文件
# 默认配置：使用 DeepSeek 模型

server.port=8080
spring.application.name=spring-ai-chat

# ================================================
# AI 模型配置
# ================================================

# DeepSeek 配置（默认）
# 获取 API 密钥：https://platform.deepseek.com/api_keys
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
spring.ai.openai.chat.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-reasoner

# 可选：指定 completions 路径（通常不需要修改）
# spring.ai.openai.chat.completions-path=/v1/chat/completions

# ================================================
# 使用说明：
# ================================================
# 1. 使用 DeepSeek：设置环境变量 DEEPSEEK_API_KEY=your-key
#    或直接修改上面的 api-key 值
#
# 2. 切换其他模型：
#    a) 使用命令行参数激活不同 profile：
#       --spring.profiles.active=deepseek
#       或 --spring.profiles.active=qwen
#
#    b) 创建对应 profile 的配置文件：
#       - application-deepseek.properties (已存在)
#       - application-qwen.properties
#
# 3. 测试 API 连接：
#    curl "http://localhost:8080/qwen/chat?userInput=Hello"
